version: "3.8"

services:

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LOKI_HOST=loki
      - TEMPO_HOST=tempo
    depends_on:
      - loki
      - tempo
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # ── Tempo — хранилище трейсов ──────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    user: "0"   # запускаем от root чтобы не было проблем с правами
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml
      - tempo-data:/var/tempo   # именованный volume вместо /tmp
    command: -config.file=/etc/tempo.yml
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    # remote_write API нужен для span-metrics из Tempo
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # Включаем tempo + traceID в логах
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  monitoring:
    driver: bridge
