spring.application.name=isrpo-lab2

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=isrpo-lab2

# ── Distributed Tracing ────────────────────────────────────────────────
# Семплируем 100% трейсов (для лабы — все, в проде ставить 0.1–0.5)
management.tracing.sampling.probability=1.0

# OTLP-экспорт в Tempo (HTTP endpoint)
management.otlp.tracing.endpoint=http://${TEMPO_HOST:localhost}:4318/v1/traces

# Пробрасываем traceId и spanId в MDC — нужно для корреляции с Loki
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.ru.itmo.isrpo=DEBUG
logging.level.com.github.loki4j=DEBUG
spring.aop.proxy-target-class=true
